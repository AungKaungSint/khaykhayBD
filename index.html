<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
</head>
<body>

    <div id="terminal" class="terminal-container">
        <span id="typed"></span>
    </div>

    <div id="surprise" class="hidden">
        <div class="header">
            <h1>Happy Birthday! 🎂</h1>
            <p>In every movement of yours, I find my favorite memory.🫶</p>
        </div>

        <div class="slideshow-container">
            <div class="frame"><img src="photo1.jpg" alt="Memory 1"></div>
            <div class="frame"><img src="photo2.jpg" alt="Memory 2"></div>
            <div class="frame"><img src="photo3.jpg" alt="Memory 3"></div>
            <div class="frame"><img src="photo4.jpg" alt="Memory 4"></div>
            <div class="frame"><img src="photo5.jpg" alt="Memory 5"></div>
            <div class="frame"><img src="photo6.jpg" alt="Memory 6"></div>
            <div class="frame"><img src="photo7.jpg" alt="Memory 7"></div>
            <div class="frame"><img src="photo8.jpg" alt="Memory 8"></div>
            <div class="frame"><img src="photo9.jpg" alt="Memory 9"></div>
        </div>
    </div>

    <audio id="birthday-song" src="candy_necklace.m4a" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
